name: clase-arquitectura

services:

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - 8000:80
    depends_on:
      - api_gateway
    networks:
      - auth_network

  load_balancer:
    image: nginx:latest
    container_name: load_balancer
    ports:
      - 3000:3000
    volumes:
      - ./nginx.load_balancer.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api_gateway
    networks:
      - auth_network

  api_gateway:
    build: ./api-gateway
    ports:
      - 5000
    environment:
      - PORT=5000
      - AUTH_SERVICE_URL=http://auth_service:3000
      - USER_SERVICE_URL=http://user_service:8000
    depends_on:
      - auth_service
      - user_service
    networks:
      - auth_network
    deploy:
      mode: replicated
      replicas: 2
      endpoint_mode: dnsrr


  auth_service:
    build: ./authentication-service
    container_name: auth_service
    ports:
      - 3000
    environment:
      - PORT=3000
      - DB_URL=mongodb://root:example@mongodb:27017
      - DB_NAME=Logins
      - USER_SERVICE_URL=http://user_service:8000
    depends_on:
      - mongodb
      - user_service

    networks:
      - auth_network

  user_service:
    build: ./user-service
    container_name: user_service
    ports:
      - 8000
    environment:
      - ROOT_PATH=/users-service
    networks:
      - auth_network

  mongodb:
    image: mongo:8.2.3
    container_name: mongodb
    ports:
      - 27017:27017
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
      MONGO_INITDB_DATABASE: Logins
    volumes:
      - mongodb_data:/data/db
    networks:
      - auth_network

volumes:
  mongodb_data:

networks:
  auth_network:

